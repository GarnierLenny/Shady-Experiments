<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whispering Hacker — end screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#08090a; --panel:#0e1112; --line:#1d2123; --line2:#2a2f31;
    --ink:#ededed; --mut:#9a9d9e; --faint:#5a5e60; --dim:#3a3e40;
    --green:#4ec46a; --red:#ef5b54; --cyan:#36c5f0;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --acc:#e9ba4c; --acc-b:#f8d066;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(120% 80% at 82% -10%, rgba(233,186,76,.04), transparent 55%), var(--bg);
    color:var(--ink);font-family:var(--mono);min-height:100vh}
  body[data-acc="2"]{--acc:#3ddc84;--acc-b:#74f0a8}
  body[data-acc="3"]{--acc:#a07bf5;--acc-b:#c4adff}
  /* result colour: green when cleared, red when failed */
  body[data-state="complete"]{--res:var(--green)}
  body[data-state="failed"]{--res:var(--red)}

  /* ---- control bar ---- */
  .bar{display:flex;align-items:center;gap:26px;flex-wrap:wrap;padding:18px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,9,10,.92);backdrop-filter:blur(6px);z-index:5}
  .brand{font-weight:700;font-size:15px;letter-spacing:.06em}
  .brand em{color:var(--acc);font-style:normal;font-weight:500;margin-left:8px;font-size:12px}
  .seg{display:flex;align-items:center;gap:6px}
  .seg .dbg{font-size:9px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-right:4px}
  .seg button{border:1px solid var(--line2);background:transparent;color:var(--mut);font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:7px 13px;cursor:pointer;border-radius:3px}
  .seg button.on{border-color:var(--acc);color:var(--acc);background:rgba(233,186,76,.08)}
  .spacer{flex:1}
  .hint{font-size:11px;color:var(--faint);letter-spacing:.04em}

  /* ---- gallery ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:26px;padding:26px;max-width:1500px;margin:0 auto}
  .vcard{display:flex;flex-direction:column;gap:10px}
  .vlabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .vlabel b{color:var(--acc);font-weight:600}
  .screen{position:relative;aspect-ratio:16/10;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--bg)}

  /* the rendered end-screen fills its frame */
  .scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:26px;text-align:center}
  .over{font-size:10px;letter-spacing:.36em;color:var(--faint);text-transform:uppercase}
  .head{font-size:34px;letter-spacing:.14em;font-weight:700;line-height:1}
  .head.sm{font-size:22px;letter-spacing:.1em}
  .uline{height:2px;width:120px;background:var(--acc)}
  .sub{font-size:12px;color:var(--mut);letter-spacing:.06em}
  .stat{display:flex;gap:18px;font-size:12px;color:var(--mut);letter-spacing:.06em}
  .stat b{color:var(--ink);font-weight:600}

  /* buttons */
  .btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.1em;padding:11px 18px;border-radius:3px;border:1px solid var(--line2);background:rgba(255,255,255,.015);color:var(--ink);cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--acc);color:var(--acc-b)}
  .btn.primary{border-color:var(--acc);background:var(--acc);color:#0a0b0c;font-weight:700}
  .btn.primary:hover{background:var(--acc-b);border-color:var(--acc-b);color:#0a0b0c}
  .btn.ghost{color:var(--faint);border-color:var(--line)}
  .btn.ghost:hover{border-color:var(--red);color:var(--red)}

  /* corner brackets */
  .corner{position:absolute;width:18px;height:18px;border:2px solid var(--acc);opacity:.85}
  .corner.tl{top:14px;left:14px;border-right:none;border-bottom:none}
  .corner.tr{top:14px;right:14px;border-left:none;border-bottom:none}
  .corner.bl{bottom:14px;left:14px;border-right:none;border-top:none}
  .corner.br{bottom:14px;right:14px;border-left:none;border-top:none}

  /* A — terminal modal */
  .scr.modal .head{color:var(--res)}
  .scr.modal .uline{background:var(--res)}

  /* B — stamp dossier */
  .scr.stamp-scr{justify-content:center}
  .stamp{font-family:'Special Elite',var(--mono);font-size:40px;letter-spacing:.06em;border:3px solid var(--res);color:var(--res);padding:8px 22px;transform:rotate(-5deg);border-radius:4px;opacity:.92;
    box-shadow:0 0 0 1px rgba(0,0,0,.3) inset}
  .scr.stamp-scr .head{font-family:'Special Elite',var(--mono)}

  /* C — CRT glitch */
  .scr.crt{background:#06070b}
  .scan{position:absolute;inset:0;background:repeating-linear-gradient(rgba(255,255,255,.035) 0 1px, transparent 1px 3px);pointer-events:none;mix-blend-mode:overlay}
  .glitch{position:relative;font-size:36px;font-weight:700;letter-spacing:.14em;color:var(--res)}
  .glitch::before,.glitch::after{content:attr(data-t);position:absolute;left:0;top:0;width:100%}
  .glitch::before{color:var(--cyan);clip-path:inset(0 0 56% 0);animation:gl1 .9s infinite steps(2)}
  .glitch::after{color:var(--red);clip-path:inset(56% 0 0 0);animation:gl2 .9s infinite steps(2)}
  @keyframes gl1{0%,100%{transform:translate(0,0)}40%{transform:translate(-2px,-1px)}80%{transform:translate(2px,0)}}
  @keyframes gl2{0%,100%{transform:translate(0,0)}40%{transform:translate(2px,1px)}80%{transform:translate(-2px,0)}}

  /* D — boot log */
  .scr.log{align-items:stretch;justify-content:center;text-align:left;font-size:13px;gap:7px;padding:30px 34px}
  .logline{color:var(--mut);letter-spacing:.03em}
  .logline.faint{color:var(--faint)}
  .logline b{font-weight:600}
  .caret{display:inline-block;width:8px;background:var(--res);color:transparent;margin-left:2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .scr.log .btns{justify-content:flex-start;margin-top:14px}
  .btn.cmd{background:transparent;border-color:var(--line2);letter-spacing:.06em}

  /* E — minimal */
  .scr.minimal{gap:18px}
  .scr.minimal .bigword{font-size:58px;font-weight:700;letter-spacing:.08em;color:var(--res);line-height:.95}
  .scr.minimal .btn{border-color:transparent;background:transparent;color:var(--mut);padding:8px 10px}
  .scr.minimal .btn:hover{color:var(--acc-b)}
  .scr.minimal .btn.primary{background:transparent;color:var(--acc-b);border-bottom:2px solid var(--acc);border-radius:0;font-weight:700}
  .scr.minimal .btn.ghost:hover{color:var(--red)}

  .footnote{padding:8px 26px 30px;color:var(--faint);font-size:11px;letter-spacing:.06em;text-align:center}
</style>
</head>
<body data-state="complete" data-acc="1">
  <div class="bar">
    <div class="brand">WHISPERING HACKER <em>end screens</em></div>
    <div class="seg" id="stateseg">
      <span class="dbg">state</span>
      <button data-s="complete" class="on" onclick="setState('complete')">COMPLETE</button>
      <button data-s="failed" onclick="setState('failed')">FAILED</button>
    </div>
    <div class="seg" id="accseg">
      <span class="dbg">level accent</span>
      <button data-a="1" class="on" onclick="setAcc('1')">L1</button>
      <button data-a="2" onclick="setAcc('2')">L2</button>
      <button data-a="3" onclick="setAcc('3')">L3</button>
    </div>
    <div class="spacer"></div>
    <div class="hint">pick a variant — toggle state &amp; accent to preview</div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="footnote">mock · buttons are non-functional · WHSP v1.0</div>

<script>
const STATES = {
  complete: {
    kind:'complete', over:'// transmission complete', headline:'LEVEL COMPLETE',
    word:'COMPLETE', sub:'all subsystems secured', stamp:'CLEARED', glitch:'ACCESS GRANTED',
    stats:[['time','02:14'],['strikes','1 / 3']],
    buttons:[['NEXT LEVEL','primary'],['REPLAY','normal'],['QUIT','ghost']],
  },
  failed: {
    kind:'failed', over:'// link severed', headline:'LEVEL FAILED',
    word:'FAILED', sub:'the clock ran out', stamp:'BREACH', glitch:'CONNECTION LOST',
    stats:[['reached','SYS 03'],['strikes','3 / 3']],
    buttons:[['RETRY','primary'],['QUIT','ghost']],
  },
};

const btns = (s) => s.buttons.map(([t,k]) => `<button class="btn ${k}">${t}</button>`).join('');
const cmdBtns = (s) => s.buttons.map(([t,k]) => `<button class="btn cmd ${k}">[ ${t} ]</button>`).join('');
const statRow = (s) => `<div class="stat">${s.stats.map(([k,v]) => `${k} <b>${v}</b>`).join('<span style="color:var(--dim)">·</span>')}</div>`;

const VARIANTS = [
  { name:'A — Terminal modal', render:(s)=>`
    <div class="scr modal">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="over">${s.over}</div>
      <div class="head">${s.headline}</div>
      <div class="uline"></div>
      ${statRow(s)}
      <div class="btns">${btns(s)}</div>
    </div>` },

  { name:'B — Stamp dossier', render:(s)=>`
    <div class="scr stamp-scr">
      <div class="stamp">${s.stamp}</div>
      <div class="head sm" style="color:var(--res)">${s.headline}</div>
      <div class="sub">${s.sub}</div>
      <div class="btns">${btns(s)}</div>
    </div>` },

  { name:'C — CRT glitch', render:(s)=>`
    <div class="scr crt">
      <div class="scan"></div>
      <div class="glitch" data-t="${s.glitch}">${s.glitch}</div>
      <div class="head sm" style="color:var(--res)">${s.headline}</div>
      <div class="sub">${s.sub}</div>
      <div class="btns">${btns(s)}</div>
    </div>` },

  { name:'D — Boot log', render:(s)=>{
      const ok = s.kind==='complete';
      return `<div class="scr log">
        <div class="logline faint">&gt; sweeping level integrity…</div>
        <div class="logline">&gt; modules &nbsp;<b style="color:${ok?'var(--green)':'var(--red)'}">${ok?'ALL SECURED':'INTEGRITY LOST'}</b></div>
        <div class="logline">&gt; strikes &nbsp;<b>${s.stats[1][1]}</b></div>
        <div class="logline">&gt; status &nbsp;<b style="color:var(--res)">${s.headline}</b><span class="caret">.</span></div>
        <div class="btns">${cmdBtns(s)}</div>
      </div>`;
    } },

  { name:'E — Minimal', render:(s)=>`
    <div class="scr minimal">
      <div class="over">${s.over}</div>
      <div class="bigword">${s.word}</div>
      <div class="sub">${s.sub}</div>
      <div class="btns">${btns(s)}</div>
    </div>` },
];

function render(){
  const s = STATES[document.body.dataset.state];
  document.getElementById('grid').innerHTML = VARIANTS.map((v) =>
    `<div class="vcard"><div class="vlabel"><b>${v.name.split(' — ')[0]}</b> · ${v.name.split(' — ')[1]}</div>
       <div class="screen">${v.render(s)}</div></div>`).join('');
}
function setState(st){ document.body.dataset.state = st; document.querySelectorAll('#stateseg button').forEach(b=>b.classList.toggle('on',b.dataset.s===st)); render(); }
function setAcc(a){ document.body.dataset.acc = a; document.querySelectorAll('#accseg button').forEach(b=>b.classList.toggle('on',b.dataset.a===a)); render(); }
render();
</script>
</body>
</html>
